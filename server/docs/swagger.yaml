basePath: /
definitions:
  database.GenreObject:
    properties:
      genre:
        type: string
      genre_id:
        type: integer
      media_source:
        type: string
      media_type:
        type: string
      source_id:
        type: integer
    type: object
  database.RewatchRecord:
    properties:
      created_at:
        type: string
      record_id:
        description: record id for movie/show
        type: integer
      rewatch_finished_at:
        type: string
      rewatch_id:
        type: integer
      rewatch_started_at:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  database.TagObject:
    properties:
      tagID:
        format: int64
        type: integer
      tagName:
        type: string
    type: object
  database.WatchActivity:
    properties:
      created_at:
        type: string
      duration:
        description: duration/runtime in minutes
        type: integer
      episode_number:
        type: integer
      media_source:
        description: tmdb, openlibrary, etc. the main metadata provider
        type: string
      media_title:
        description: movie, tvshow, season or episode title
        type: string
      overview:
        description: game of thrones is a show about ...
        type: string
      record_id:
        type: integer
      record_type:
        description: movie,episode
        type: string
      release_date:
        description: 2012-12-30, for shows/seasons - first_air_date, for episodes
          - air_date
        type: string
      rewatch_id:
        type: integer
      season_number:
        type: integer
      show_media_title:
        type: string
      show_source_id:
        type: string
      source_id:
        description: tmdb id, episode/movie tmdb id
        type: string
      updated_at:
        type: string
      watch_event_id:
        type: integer
      watch_type:
        description: watch, scrobble
        type: string
      watched_at:
        type: string
    type: object
  database.WatchEventMediaRecord:
    properties:
      created_at:
        type: string
      duration:
        description: duration/runtime in minutes
        type: integer
      episode_number:
        type: integer
      media_source:
        description: tmdb, openlibrary, etc. the main metadata provider
        type: string
      media_title:
        description: movie, tvshow, season or episode title
        type: string
      overview:
        description: game of thrones is a show about ...
        type: string
      record_id:
        type: integer
      record_type:
        description: movie,episode
        type: string
      release_date:
        description: 2012-12-30, for shows/seasons - first_air_date, for episodes
          - air_date
        type: string
      rewatch_id:
        type: integer
      season_number:
        type: integer
      source_id:
        description: tmdb id, episode/movie tmdb id
        type: string
      updated_at:
        type: string
      watch_event_id:
        type: integer
      watch_type:
        description: watch, scrobble
        type: string
      watched_at:
        type: string
    type: object
  model.WatchHistoryMoviePayload:
    properties:
      action_type:
        enum:
        - watch
        - scrobble
        type: string
      watched_at:
        type: string
    required:
    - action_type
    type: object
  model.WatchHistoryTVShowPayload:
    properties:
      action_type:
        enum:
        - watch
        - scrobble
        type: string
      episode_ids:
        description: tmdb unique id for episode
        items:
          type: integer
        type: array
      episode_number:
        type: integer
      rewatch_id:
        type: integer
      season_number:
        type: integer
      watched_at:
        type: string
    required:
    - action_type
    type: object
  v1.AddToCollectionRequest:
    properties:
      collection_id:
        type: integer
      media_source:
        type: string
      media_type:
        type: string
      source_id:
        type: string
    required:
    - media_source
    - media_type
    - source_id
    type: object
  v1.AddWatchHistoryTVResponse:
    properties:
      inserted_episode_ids:
        items:
          type: integer
        type: array
      media_source:
        type: string
      skipped_episode_ids:
        items:
          type: integer
        type: array
    type: object
  v1.DeleteWatchHistoryPayload:
    properties:
      watch_event_ids:
        items:
          type: integer
        type: array
    required:
    - watch_event_ids
    type: object
  v1.V1ErrorResponse:
    properties:
      error:
        example: error message
        type: string
      status:
        enum:
        - success
        - error
        example: error
        type: string
    type: object
  v1.V1SuccessResponse:
    properties:
      data: {}
      status:
        enum:
        - success
        - error
        example: success
        type: string
    type: object
  view.CollectionObject:
    properties:
      collection_id:
        type: integer
      collection_title:
        description: my collection, etc.
        type: string
      created_at:
        type: string
      description:
        type: string
      is_public:
        type: boolean
      owner_username:
        type: string
      tags:
        items:
          $ref: '#/definitions/database.TagObject'
        type: array
      thumbnail_uri:
        description: url for media thumbnails
        type: string
      updated_at:
        type: string
    type: object
  view.CollectionView:
    properties:
      collection:
        $ref: '#/definitions/view.CollectionObject'
      limit:
        type: integer
      offset:
        type: integer
      records:
        items:
          $ref: '#/definitions/view.MediaRecordCatalog'
        type: array
      total_records:
        type: integer
    type: object
  view.Credit:
    properties:
      character:
        type: string
      credit_id:
        type: string
      job:
        description: cast, director, etc.
        type: string
      meta_source:
        type: string
      name:
        type: string
      original_name:
        type: string
      source_id:
        type: string
      thumbnail_uri:
        description: profile pic of person
        type: string
    required:
    - meta_source
    - source_id
    type: object
  view.MediaRecordCatalog:
    properties:
      backdrop_uri:
        type: string
      cast:
        items:
          $ref: '#/definitions/view.Credit'
        type: array
      creators:
        items:
          $ref: '#/definitions/view.Credit'
        type: array
      duration:
        description: duration/runtime in minutes
        type: integer
      episode_count:
        type: integer
      episode_number:
        type: integer
      extra_data:
        additionalProperties: true
        type: object
      genres:
        items:
          $ref: '#/definitions/database.GenreObject'
        type: array
      guest_stars:
        items:
          $ref: '#/definitions/view.Credit'
        type: array
      last_air_date:
        description: for shows, latest episode air date
        type: string
      logo_uri:
        type: string
      media_source:
        description: tmdb, openlibrary, etc
        example: tmdb
        type: string
      media_title:
        type: string
      media_type:
        enum:
        - movie
        - tvshow
        type: string
      next_air_date:
        description: for shows, next scheduled episode air date
        type: string
      origin_country:
        items:
          type: string
        type: array
      original_language:
        type: string
      original_title:
        type: string
      overview:
        type: string
      popularity:
        type: number
      release_date:
        type: string
      season_count:
        type: integer
      season_number:
        type: integer
      source_id:
        type: string
      status:
        description: Returning Series, Released, etc.
        type: string
      thumbnail_uri:
        type: string
      vote_average:
        type: number
      vote_count:
        type: integer
    required:
    - media_source
    - media_title
    - media_type
    - source_id
    type: object
  view.MediaRewatchRecordWatchEvents:
    properties:
      created_at:
        type: string
      record_id:
        description: record id for movie/show
        type: integer
      rewatch_finished_at:
        type: string
      rewatch_id:
        type: integer
      rewatch_started_at:
        type: string
      target_season:
        type: integer
      updated_at:
        type: string
      user_id:
        type: integer
      watch_events:
        items:
          $ref: '#/definitions/database.WatchEventMediaRecord'
        type: array
    type: object
  view.WatchActivityResponse:
    properties:
      limit:
        type: integer
      offset:
        type: integer
      total_records:
        type: integer
      watch_activity:
        items:
          $ref: '#/definitions/database.WatchActivity'
        type: array
    type: object
host: localhost:2323
info:
  contact: {}
  description: Hound Media Server Documentation
  title: Hound API Documentation
  version: beta-0.1.0
paths:
  /api/v1/catalog/{id}:
    get:
      consumes:
      - application/json
      parameters:
      - description: Catalog ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/v1.V1SuccessResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/view.MediaRecordCatalog'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/v1.V1ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/v1.V1ErrorResponse'
      summary: Get Catalog
      tags:
      - Catalog
