  /v1/watch_activity:
    get:
      consumes:
      - application/json
      parameters:
      - description: Limit - Defaults at 500
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      - description: Start time in RFC3339 format
        example: "2026-03-13T10:20:30Z"
        in: query
        name: start_time
        type: string
      - description: End time in RFC3339 format
        example: "2026-03-13T10:20:30Z"
