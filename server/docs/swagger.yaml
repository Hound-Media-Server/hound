basePath: /
definitions:
  database.DownloadPreference:
    properties:
      info_hash_preference:
        $ref: '#/definitions/database.DownloadPreferenceInfoHash'
      match_type:
        type: string
      string_match_preference:
        $ref: '#/definitions/database.DownloadPreferenceString'
    type: object
  database.DownloadPreferenceInfoHash:
    properties:
      info_hash:
        type: string
    type: object
  database.DownloadPreferenceString:
    properties:
      case_sensitive:
        type: boolean
      match_string:
        type: string
    type: object
  database.GenreObject:
    properties:
      genre:
        type: string
      genre_id:
        type: integer
      media_source:
        type: string
      media_type:
        type: string
      source_id:
        type: integer
    type: object
  database.GenreRecord:
    properties:
      created_at:
        type: string
      genre:
        type: string
      genre_id:
        type: integer
      media_source:
        type: string
      media_type:
        type: string
      source_id:
        type: integer
      updated_at:
        type: string
    type: object
  database.IngestDownloadPreferences:
    properties:
      preference_list:
        items:
          $ref: '#/definitions/database.DownloadPreference'
        type: array
      strict_match:
        description: whether if no match is found, to fail the download
        type: boolean
    type: object
  database.IngestTaskFullRecord:
    properties:
      connected_seeders:
        description: number of seeders (p2p only)
        type: integer
      created_at:
        type: string
      destination_path:
        description: path to final destination in hound media dir
        type: string
      download_preferences:
        allOf:
        - $ref: '#/definitions/database.IngestDownloadPreferences'
        description: for season/auto downloads
      download_priority:
        description: priority of task, not used for now
        type: integer
      download_protocol:
        description: p2p, http, external (not downloaded by hound)
        type: string
      download_speed:
        description: bytes per second
        type: integer
      downloaded_bytes:
        type: integer
      episode_media_record:
        $ref: '#/definitions/database.MediaRecord'
      file_idx:
        description: index for p2p only
        type: integer
      finished_at:
        type: string
      ingest_task_id:
        type: integer
      last_message:
        description: store last error message
        type: string
      last_seen:
        description: track stale download/copy jobs
        type: string
      media_type:
        type: string
      movie_media_record:
        $ref: '#/definitions/database.MediaRecord'
      record_id:
        description: episode or movie to be ingested
        type: integer
      show_media_record:
        $ref: '#/definitions/database.MediaRecord'
      source_path:
        description: path to source file/download path
        type: string
      source_uri:
        description: magnet uri with trackers / http link
        type: string
      started_at:
        description: time queued task was started
        type: string
      status:
        description: pending_insert, processing, completed
        type: string
      total_bytes:
        description: total bytes to be downloaded
        type: integer
      updated_at:
        type: string
    type: object
  database.MediaFile:
    properties:
      bit_rate:
        type: string
      created_at:
        type: string
      duration:
        type: integer
      file_id:
        type: integer
      file_idx:
        type: integer
      file_name:
        type: string
      file_origin:
        type: string
      file_path:
        type: string
      file_size:
        type: integer
      format_long_name:
        type: string
      format_name:
        type: string
      framerate:
        type: string
      height:
        type: integer
      original_file_name:
        type: string
      record_id:
        type: integer
      source_uri:
        type: string
      streams:
        items:
          $ref: '#/definitions/database.Stream'
        type: array
      updated_at:
        type: string
      width:
        type: integer
    type: object
  database.MediaRecord:
    properties:
      ancestor_id:
        description: reference to fk record_id of the show, for episodes
        type: integer
      backdrop_uri:
        description: backgrounds
        type: string
      content_hash:
        description: checksum to compare changes/updates
        type: string
      created_at:
        type: string
      duration:
        description: duration/runtime in minutes
        type: integer
      episode_number:
        type: integer
      full_data:
        description: full data from tmdb
        items:
          type: integer
        type: array
      genres:
        description: to store genres, tags
        items:
          $ref: '#/definitions/database.GenreObject'
        type: array
      last_air_date:
        description: for shows, latest episode air date
        type: string
      logo_uri:
        description: logo for the show/movie
        type: string
      media_source:
        description: tmdb, openlibrary, etc. the main metadata provider
        type: string
      media_title:
        description: movie, tvshow, season or episode title
        type: string
      next_air_date:
        description: for shows, next scheduled episode air date
        type: string
      origin_country:
        items:
          type: string
        type: array
      original_language:
        type: string
      original_title:
        description: original title in release language
        type: string
      overview:
        description: game of thrones is a show about ...
        type: string
      parent_id:
        description: reference to fk record_id, null for movie, tvshow
        type: integer
      record_id:
        type: integer
      record_type:
        description: movie,tvshow,season,episode
        type: string
      release_date:
        description: 2012-12-30, for shows/seasons - first_air_date, for episodes
          - air_date
        type: string
      season_number:
        type: integer
      sort_index:
        description: not in use yet, used to sort based on user preferences
        type: integer
      source_id:
        description: tmdb id, episode/season tmdb id
        type: string
      status:
        description: Returning Series, Released, etc.
        type: string
      tags:
        items:
          $ref: '#/definitions/database.TagObject'
        type: array
      thumbnail_uri:
        description: poster image for shows/movies, still image for episode
        type: string
      updated_at:
        type: string
    type: object
  database.RewatchRecord:
    properties:
      created_at:
        type: string
      record_id:
        description: record id for movie/show
        type: integer
      rewatch_finished_at:
        type: string
      rewatch_id:
        type: integer
      rewatch_started_at:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  database.Stream:
    properties:
      channel_layout:
        type: string
      channels:
        type: integer
      codec_long_name:
        type: string
      codec_name:
        type: string
      codec_type:
        description: video, audio, subtitle
        type: string
      color_primaries:
        type: string
      color_range:
        type: string
      color_space:
        type: string
      color_transfer:
        type: string
      language:
        type: string
      pix_fmt:
        type: string
      profile:
        type: string
      title:
        type: string
    type: object
  database.TagObject:
    properties:
      tagID:
        format: int64
        type: integer
      tagName:
        type: string
    type: object
  database.VideoMetadata:
    properties:
      bit_rate:
        type: string
      duration:
        type: integer
      file_name:
        type: string
      file_size:
        type: integer
      format_long_name:
        type: string
      format_name:
        type: string
      framerate:
        type: string
      height:
        type: integer
      streams:
        items:
          $ref: '#/definitions/database.Stream'
        type: array
      width:
        type: integer
    type: object
  database.WatchActivity:
    properties:
      created_at:
        type: string
      duration:
        description: duration/runtime in minutes
        type: integer
      episode_number:
        type: integer
      media_source:
        description: tmdb, openlibrary, etc. the main metadata provider
        type: string
      media_title:
        description: movie, tvshow, season or episode title
        type: string
      overview:
        description: game of thrones is a show about ...
        type: string
      record_id:
        type: integer
      record_type:
        description: movie,episode
        type: string
      release_date:
        description: 2012-12-30, for shows/seasons - first_air_date, for episodes
          - air_date
        type: string
      rewatch_id:
        type: integer
      season_number:
        type: integer
      show_media_title:
        type: string
      show_source_id:
        type: string
      source_id:
        description: tmdb id, episode/movie tmdb id
        type: string
      updated_at:
        type: string
      watch_event_id:
        type: integer
      watch_type:
        description: watch, scrobble
        type: string
      watched_at:
        type: string
    type: object
  database.WatchEventMediaRecord:
    properties:
      created_at:
        type: string
      duration:
        description: duration/runtime in minutes
        type: integer
      episode_number:
        type: integer
      media_source:
        description: tmdb, openlibrary, etc. the main metadata provider
        type: string
      media_title:
        description: movie, tvshow, season or episode title
        type: string
      overview:
        description: game of thrones is a show about ...
        type: string
      record_id:
        type: integer
      record_type:
        description: movie,episode
        type: string
      release_date:
        description: 2012-12-30, for shows/seasons - first_air_date, for episodes
          - air_date
        type: string
      rewatch_id:
        type: integer
      season_number:
        type: integer
      source_id:
        description: tmdb id, episode/movie tmdb id
        type: string
      updated_at:
        type: string
      watch_event_id:
        type: integer
      watch_type:
        description: watch, scrobble
        type: string
      watched_at:
        type: string
    type: object
  database.WatchStats:
    properties:
      episodes_watched:
        description: a show is included even though it's not completed
        type: integer
      finish_time:
        type: string
      movies_watched:
        type: integer
      shows_watched:
        type: integer
      start_time:
        description: query start, finish time
        type: string
      total_episodes_duration:
        type: integer
      total_movies_duration:
        type: integer
    type: object
  model.LoginUser:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  model.NextEpisode:
    properties:
      episode_number:
        description: only defined for shows
        type: integer
      episode_source_id:
        description: episode source id
        type: string
      episode_title:
        type: string
      media_title:
        description: movie/show title
        type: string
      overview:
        type: string
      release_date:
        type: string
      season_number:
        description: only defined for shows
        type: integer
      thumbnail_uri:
        type: string
    type: object
  model.PlayerSettings:
    properties:
      audio_idx:
        type: integer
      audio_lang:
        type: string
      player:
        description: mpv, exoplayer, etc.
        type: string
      resize_mode:
        description: whether the video is zoomed to fill/normal, etc.
        type: string
      subtitle_idx:
        type: integer
      subtitle_lang:
        type: string
    type: object
  model.RegistrationUser:
    properties:
      first_name:
        type: string
      last_name:
        type: string
      password:
        minLength: 8
        type: string
      username:
        type: string
    required:
    - first_name
    - last_name
    - password
    - username
    type: object
  model.WatchAction:
    properties:
      media_source:
        type: string
      media_type:
        type: string
      next_episode:
        allOf:
        - $ref: '#/definitions/model.NextEpisode'
        description: only for next episode watch action type
      source_id:
        type: string
      watch_action_type:
        description: next_episode or resume
        type: string
      watch_progress:
        allOf:
        - $ref: '#/definitions/model.WatchProgress'
        description: only for resume watch action type
    type: object
  model.WatchHistoryMoviePayload:
    properties:
      action_type:
        enum:
        - watch
        - scrobble
        type: string
      watched_at:
        type: string
    required:
    - action_type
    type: object
  model.WatchHistoryTVShowPayload:
    properties:
      action_type:
        enum:
        - watch
        - scrobble
        type: string
      episode_ids:
        description: tmdb unique id for episode
        items:
          type: integer
        type: array
      episode_number:
        type: integer
      rewatch_id:
        type: integer
      season_number:
        type: integer
      watched_at:
        type: string
    required:
    - action_type
    type: object
  model.WatchProgress:
    properties:
      client_platform:
        description: android-tv, etc.
        type: string
      current_progress_seconds:
        description: how many seconds in the user is
        type: integer
      encoded_data:
        description: for hound-proxied sources
        type: string
      episode_number:
        description: only defined for shows
        type: integer
      episode_source_id:
        description: episode source id
        type: string
      episode_title:
        type: string
      last_watched_at:
        description: last unix time when the playback progress was set
        type: integer
      media_source:
        description: '"tmdb"'
        type: string
      media_title:
        description: movie/show title
        type: string
      media_type:
        description: '"movie" or "tvshow"'
        type: string
      overview:
        type: string
      player_settings:
        allOf:
        - $ref: '#/definitions/model.PlayerSettings'
        description: player, audio, subtitle selections, etc.
      release_date:
        type: string
      season_number:
        description: only defined for shows
        type: integer
      source_id:
        description: movie/show source id
        type: string
      source_uri:
        description: magnet, http link, local path
        type: string
      stream_protocol:
        description: p2p, http, local, etc.
        type: string
      thumbnail_uri:
        type: string
      total_duration_seconds:
        description: total duration of the media in seconds
        type: integer
    required:
    - current_progress_seconds
    - total_duration_seconds
    type: object
  providers.ProviderObject:
    properties:
      provider:
        description: provider name in /providers folder
        type: string
      streams:
        items:
          $ref: '#/definitions/providers.StreamObject'
        type: array
    type: object
  providers.ProviderResponseObject:
    properties:
      episode_number:
        type: integer
      episode_source_id:
        description: tv shows only
        type: string
      imdb_id:
        description: starts with 'tt'
        type: string
      media_source:
        type: string
      media_type:
        description: movies or tvshows, etc.
        type: string
      providers:
        items:
          $ref: '#/definitions/providers.ProviderObject'
        type: array
      season_number:
        description: shows only
        type: integer
      source_id:
        type: string
    type: object
  providers.StreamObject:
    properties:
      description:
        type: string
      encoded_data:
        description: data encoded in AES for playing streams in hound
        type: string
      file_idx:
        description: file index for p2p type
        type: integer
      file_name:
        description: might not be reliable
        type: string
      file_size:
        description: file size in bytes
        type: integer
      info_hash:
        type: string
      provider:
        type: string
      sources:
        description: trackers for p2p
        items:
          type: string
        type: array
      stream_protocol:
        description: http or p2p
        type: string
      title:
        type: string
      uri:
        description: magnet link, http link, or file path
        type: string
      video_metadata:
        $ref: '#/definitions/database.VideoMetadata'
    type: object
  sources.IGDBSearchObject:
    properties:
      cover:
        properties:
          id:
            type: integer
          image_id:
            type: string
          image_url:
            type: string
        type: object
      first_release_date:
        type: integer
      genres:
        items:
          properties:
            id:
              type: integer
            name:
              type: string
          type: object
        type: array
      id:
        type: integer
      media_source:
        type: string
      media_title:
        type: string
      media_type:
        type: string
      name:
        type: string
      platforms:
        items:
          properties:
            id:
              type: integer
            name:
              type: string
          type: object
        type: array
      release_date:
        type: string
      source_id:
        type: integer
      thumbnail_uri:
        type: string
    type: object
  v1.AddToCollectionRequest:
    properties:
      collection_id:
        type: integer
      media_source:
        type: string
      media_type:
        type: string
      source_id:
        type: string
    required:
    - media_source
    - media_type
    - source_id
    type: object
  v1.AddWatchHistoryMovieResponse:
    properties:
      action_type:
        type: string
      inserted_source_id:
        type: integer
      media_source:
        type: string
    type: object
  v1.AddWatchHistoryTVResponse:
    properties:
      inserted_episode_ids:
        items:
          type: integer
        type: array
      media_source:
        type: string
      skipped_episode_ids:
        items:
          type: integer
        type: array
    type: object
  v1.CancelIngestTaskResponse:
    properties:
      ingest_task_id:
        type: integer
      status:
        example: pending_cancel
        type: string
    type: object
  v1.DeletePlaybackProgressPayload:
    properties:
      episode_number:
        type: integer
      season_number:
        type: integer
    type: object
  v1.DeleteWatchHistoryPayload:
    properties:
      watch_event_ids:
        items:
          type: integer
        type: array
    required:
    - watch_event_ids
    type: object
  v1.DownloadResponse:
    properties:
      status:
        example: started
        type: string
    type: object
  v1.LoginResponse:
    properties:
      token:
        type: string
      username:
        type: string
    type: object
  v1.RegistrationResponse:
    properties:
      username:
        type: string
    type: object
  v1.SetPlaybackProgressResponse:
    properties:
      watched:
        example: false
        type: boolean
    type: object
  v1.TVSeasonDownloadRequest:
    properties:
      episodes_to_download:
        items:
          type: integer
        type: array
      preference_list:
        items:
          $ref: '#/definitions/database.DownloadPreference'
        type: array
      skip_downloaded_episodes:
        type: boolean
      strict_match:
        description: whether if no match is found, to fail the download
        type: boolean
    type: object
  v1.TVSeasonDownloadResponse:
    properties:
      queued_episodes:
        items:
          type: integer
        type: array
      season:
        type: integer
      skipped_episodes:
        items:
          $ref: '#/definitions/v1.skippedEpisode'
        type: array
      status:
        example: queued
        type: string
    type: object
  v1.V1ErrorResponse:
    properties:
      error:
        example: error message
        type: string
      status:
        enum:
        - success
        - error
        example: error
        type: string
    type: object
  v1.V1SuccessResponse:
    properties:
      data: {}
      status:
        enum:
        - success
        - error
        example: success
        type: string
    type: object
  v1.skippedEpisode:
    properties:
      episode_number:
        type: integer
      error:
        type: string
    type: object
  view.CollectionObject:
    properties:
      collection_id:
        type: integer
      collection_title:
        description: my collection, etc.
        type: string
      created_at:
        type: string
      description:
        type: string
      is_public:
        type: boolean
      owner_username:
        type: string
      tags:
        items:
          $ref: '#/definitions/database.TagObject'
        type: array
      thumbnail_uri:
        description: url for media thumbnails
        type: string
      updated_at:
        type: string
    type: object
  view.CollectionView:
    properties:
      collection:
        $ref: '#/definitions/view.CollectionObject'
      limit:
        type: integer
      offset:
        type: integer
      records:
        items:
          $ref: '#/definitions/view.MediaRecordCatalog'
        type: array
      total_records:
        type: integer
    type: object
  view.Credit:
    properties:
      character:
        type: string
      credit_id:
        type: string
      job:
        description: cast, director, etc.
        type: string
      meta_source:
        type: string
      name:
        type: string
      original_name:
        type: string
      source_id:
        type: string
      thumbnail_uri:
        description: profile pic of person
        type: string
    required:
    - meta_source
    - source_id
    type: object
  view.GeneralSearchResponse:
    properties:
      game_results:
        items:
          $ref: '#/definitions/sources.IGDBSearchObject'
        type: array
      movie_results:
        items:
          $ref: '#/definitions/view.MediaRecordCatalog'
        type: array
      tv_results:
        items:
          $ref: '#/definitions/view.MediaRecordCatalog'
        type: array
    type: object
  view.IngestTaskResponse:
    properties:
      limit:
        type: integer
      offset:
        type: integer
      tasks:
        items:
          $ref: '#/definitions/database.IngestTaskFullRecord'
        type: array
      total_records:
        type: integer
    type: object
  view.MediaFilesResponse:
    properties:
      files:
        items:
          $ref: '#/definitions/database.MediaFile'
        type: array
      limit:
        type: integer
      offset:
        type: integer
      total_records:
        type: integer
    type: object
  view.MediaRecordCatalog:
    properties:
      backdrop_uri:
        type: string
      cast:
        items:
          $ref: '#/definitions/view.Credit'
        type: array
      creators:
        items:
          $ref: '#/definitions/view.Credit'
        type: array
      duration:
        description: duration/runtime in minutes
        type: integer
      episode_count:
        type: integer
      episode_number:
        type: integer
      extra_data:
        additionalProperties: true
        type: object
      genres:
        items:
          $ref: '#/definitions/database.GenreObject'
        type: array
      guest_stars:
        items:
          $ref: '#/definitions/view.Credit'
        type: array
      last_air_date:
        description: for shows, latest episode air date
        type: string
      logo_uri:
        type: string
      media_source:
        description: tmdb, openlibrary, etc
        example: tmdb
        type: string
      media_title:
        type: string
      media_type:
        enum:
        - movie
        - tvshow
        type: string
      next_air_date:
        description: for shows, next scheduled episode air date
        type: string
      origin_country:
        items:
          type: string
        type: array
      original_language:
        type: string
      original_title:
        type: string
      overview:
        type: string
      popularity:
        type: number
      release_date:
        type: string
      season_count:
        type: integer
      season_number:
        type: integer
      source_id:
        type: string
      status:
        description: Returning Series, Released, etc.
        type: string
      thumbnail_uri:
        type: string
      vote_average:
        type: number
      vote_count:
        type: integer
    required:
    - media_source
    - media_title
    - media_type
    - source_id
    type: object
  view.MediaRewatchRecordWatchEvents:
    properties:
      created_at:
        type: string
      record_id:
        description: record id for movie/show
        type: integer
      rewatch_finished_at:
        type: string
      rewatch_id:
        type: integer
      rewatch_started_at:
        type: string
      target_season:
        type: integer
      updated_at:
        type: string
      user_id:
        type: integer
      watch_events:
        items:
          $ref: '#/definitions/database.WatchEventMediaRecord'
